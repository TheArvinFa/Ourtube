name: 01 - 🎯 دانلود یوتیوب (نسخه آرتیفکت یکپارچه)

on:
  workflow_dispatch:
    inputs:
      activation_key:
        description: '🔑 کدفعالسازی (یکبار در ابتدا ) اگر ندارید از اینجا بگیرید : pay.avasam.ir/link/769604'
        required: false
        default: ''
        type: string
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  check-activation:
    name: "🔍 بررسی فعالسازی"
    runs-on: ubuntu-latest
    outputs:
      is_activated: ${{ steps.check.outputs.is_activated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore activation cache
        id: cache-activation
        uses: actions/cache@v4
        with:
          path: .activation-status
          key: activation-status-yt-${{ github.repository }}

      - name: Check activation status
        id: check
        run: |
          echo "========================================"
          echo "🔍 بررسی وضعیت فعالسازی..."
          echo "========================================"
          if [ -f ".activation-status/act.txt" ]; then
            ACT_STATUS=$(cat .activation-status/act.txt 2>/dev/null || echo "")
            if [ "$ACT_STATUS" = "1" ]; then
              echo "is_activated=true" >> $GITHUB_OUTPUT
              echo "✅ وضعیت: فعال شده"
              echo "🎉 دانلودر شما فعال است!"
            else
              echo "is_activated=false" >> $GITHUB_OUTPUT
              echo "🔒 وضعیت: فعال نشده"
            fi
          else
            echo "is_activated=false" >> $GITHUB_OUTPUT
            echo "🔒 وضعیت: فعال نشده"
            echo "⚠️ برای استفاده از دانلودر، ابتدا باید آن را فعال کنید"
          fi
          echo "========================================"

  activate:
    name: "🔐 فعالسازی با کد"
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'false' && github.event.inputs.activation_key != ''
    runs-on: ubuntu-latest
    outputs:
      just_activated: ${{ steps.validate.outputs.valid }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and validate activation code
        id: validate
        run: |
          INPUT_CODE="${{ github.event.inputs.activation_key }}"
          KEYS_URL="https://raw.githubusercontent.com/keepfiless/activate/refs/heads/main/checklist/yt.txt"

          echo "========================================"
          echo "🔐 در حال بررسی کد فعالسازی..."
          echo "========================================"
          echo ""
          echo "📥 دریافت لیست کدهای معتبر..."
          curl -sL "$KEYS_URL" | tr -d '\r' | grep -v '^$' > /tmp/raw_codes.txt

          # Extract last 4 characters of each valid code
          > /tmp/valid_codes.txt
          while IFS= read -r code; do
            code=$(echo "$code" | tr -d '[:space:]')
            [ -z "$code" ] && continue
            if [ ${#code} -gt 4 ]; then
              echo "${code: -4}" >> /tmp/valid_codes.txt
            else
              echo "$code" >> /tmp/valid_codes.txt
            fi
          done < /tmp/raw_codes.txt

          # Extract last 4 characters of user's input code
          if [ ${#INPUT_CODE} -gt 4 ]; then
            INPUT_CODE_LAST4="${INPUT_CODE: -4}"
          else
            INPUT_CODE_LAST4="$INPUT_CODE"
          fi

          echo "🔍 بررسی کد..."

          if grep -qx "$INPUT_CODE_LAST4" /tmp/valid_codes.txt; then
            echo ""
            echo "✅ کد فعالسازی معتبر است!"
            echo "🎊 تبریک! کد شما تایید شد"
            echo ""
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "❌ کد فعالسازی نامعتبر است!"
            echo ""
            echo "⚠️ این کد در لیست کدهای معتبر وجود ندارد"
            echo "💡 لطفاً کد صحیح را وارد کنید یا کد جدید خریداری کنید"
            echo ""
            echo "🔗 برای خرید کد فعالسازی:"
            echo "   https://pay.avasam.ir/link/769604"
            echo ""
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
          echo "========================================"

      - name: Fail on invalid code
        if: steps.validate.outputs.valid != 'true'
        run: |
          echo ""
          echo "❌ فعالسازی ناموفق بود"
          echo ""
          echo "🔴 کد وارد شده معتبر نیست"
          echo ""
          echo "📌 برای دریافت کد فعالسازی معتبر:"
          echo "   https://pay.avasam.ir/link/769604"
          echo ""

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          <div align="center">
          <img src="https://raw.githubusercontent.com/nikzad-avasam/notifications/refs/heads/main/assets/invalid-key.gif" alt="Invalid Key" width="250" />

          # خطا در فعالسازی
          </div>

          ---

          <div dir="rtl">

          شما کلید فعالساز وارد نکرده یا کلید وارد شده اشتباه است به همین علت امکان استفاده از این پروژه برای شما وجود ندارد.

          برای خرید کلید فعالسازی به لینک پایین مراجعه کنید.

          **نکات :**
          - کلید دائمی است.
          - وارد کردن کلید فعالسازی فقط یکبار کافی است. دفعات بعدی نیاز نیست.
          - در صورت بروز هرگونه مشکل در پیام رسان بله به ایدی @ask_here پیام دهید.

          **لینک خرید کلید فعالسازی :**

          [https://pay.avasam.ir/link/769604](https://pay.avasam.ir/link/769604)

          </div>
          EOF

          exit 1

      - name: Save activation to cache
        if: steps.validate.outputs.valid == 'true'
        run: |
          echo "💾 در حال ذخیره وضعیت فعالسازی در کش..."
          mkdir -p .activation-status
          echo "1" > .activation-status/act.txt
          echo "activated_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> .activation-status/info.txt
          echo "activated_by=${{ github.actor }}" >> .activation-status/info.txt
          echo "✅ فعالسازی ذخیره شد"

      - name: Cache activation status
        if: steps.validate.outputs.valid == 'true'
        uses: actions/cache/save@v4
        with:
          path: .activation-status
          key: activation-status-yt-${{ github.repository }}

      - name: Activation success message
        if: steps.validate.outputs.valid == 'true'
        run: |
          echo ""
          echo "========================================"
          echo "🎉 فعالسازی با موفقیت انجام شد!"
          echo "========================================"
          echo ""
          echo "✅ دانلودر شما اکنون فعال است"
          echo "📥 در حال ادامه دانلود..."
          echo ""
          echo "========================================"

  not-activated:
    name: "⚠️ نیاز به فعالسازی"
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'false' && github.event.inputs.activation_key == ''
    runs-on: ubuntu-latest
    steps:
      - name: Show activation required
        run: |
          echo ""
          echo "========================================"
          echo "🔒 فعالسازی مورد نیاز است"
          echo "========================================"
          echo ""
          echo "⚠️ این دانلودر هنوز فعال نشده است"
          echo ""
          echo "📌 برای فعالسازی دائمی:"
          echo "   1️⃣ به لینک زیر بروید و پرداخت کنید:"
          echo "      https://pay.avasam.ir/link/769604"
          echo ""
          echo "   2️⃣ کد فعالسازی را دریافت کنید"
          echo ""
          echo "   3️⃣ workflow را دوباره اجرا کنید"
          echo "      و کد را در فیلد 'کد فعالسازی' وارد کنید"
          echo ""
          echo "========================================"

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          <div align="center">
          <img src="https://raw.githubusercontent.com/nikzad-avasam/notifications/refs/heads/main/assets/invalid-key.gif" alt="Invalid Key" width="250" />

          # خطا در فعالسازی
          </div>

          ---

          <div dir="rtl">

          شما کلید فعالساز وارد نکرده یا کلید وارد شده اشتباه است به همین علت امکان استفاده از این پروژه برای شما وجود ندارد.

          برای خرید کلید فعالسازی به لینک پایین مراجعه کنید.

          **نکات :**
          - کلید دائمی است.
          - وارد کردن کلید فعالسازی فقط یکبار کافی است. دفعات بعدی نیاز نیست.
          - در صورت بروز هرگونه مشکل در پیام رسان بله به ایدی @ask_here پیام دهید.

          **لینک خرید کلید فعالسازی :**

          [https://pay.avasam.ir/link/769604](https://pay.avasam.ir/link/769604)

          </div>
          EOF

          exit 1

  get-video:
    name: "📥 دانلود ویدیو"
    needs: [check-activation, activate]
    if: always() && !cancelled() && (needs.check-activation.outputs.is_activated == 'true' || needs.activate.outputs.just_activated == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
        run: |
          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}
          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"
          
          # پوشه نهایی نگهداری فایل‌ها برای آرتیفکت
          mkdir -p final_downloads
          > /tmp/video_info.txt

          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }

          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*/best";;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
            "2160"|"4k") FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo[height<=2160]*+bestaudio*/bestvideo+bestaudio/best";;
            "1440"|"2k") FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo[height<=1440]*+bestaudio*/bestvideo+bestaudio/best";;
            "1080") FORMAT="bestvideo[height<=1080]+bestaudio[height<=1080]*+bestaudio*/bestvideo+bestaudio/best";;
            "720") FORMAT="bestvideo[height<=720]+bestaudio[height<=720]*+bestaudio*/bestvideo+bestaudio/best";;
            "480") FORMAT="bestvideo[height<=480]+bestaudio[height<=480]*+bestaudio*/bestvideo+bestaudio/best";;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
          esac

          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3;
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL";;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL";;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL";;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "$URL";;
            esac
          }

          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false
            
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                DOWNLOAD_SUCCESS=true; break
              fi
            done
            
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              rm -rf "$TMP_DIR"; continue
            fi

            find "$TMP_DIR" -name "*.part" -delete
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi
              
              BASENAME=$(basename "$FILE")
              FILENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
              
              TARGET_FOLDER="final_downloads/${FILENAME_NO_EXT}"
              mkdir -p "$TARGET_FOLDER"
              
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then 
                cp "$THUMB_FILE" "$TARGET_FOLDER/thumbnail.jpg"
              fi
              
              echo "${FILENAME_NO_EXT}|${FILENAME_NO_EXT}" >> /tmp/video_info.txt

              # انتقال فایل و فشرده‌سازی بدون پارت‌بندی (تک فایلی یکپارچه)
              if [ -n "$ZIP_PASSWORD" ]; then
                7z a -p"${ZIP_PASSWORD}" -mhe=on "$TARGET_FOLDER/${FILENAME_NO_EXT}.zip" "$FILE"
              else
                mv "$FILE" "$TARGET_FOLDER/${FILENAME_NO_EXT}.${EXT}"
              fi
            done
            rm -rf "$TMP_DIR"
          done
          echo "final_downloads" > /tmp/backup_dir_path.txt
          printf "%s\n" "${URL_LIST[@]}" > /tmp/yt_urls.txt

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          set +e
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          mapfile -t URL_LIST < /tmp/yt_urls.txt

          sub_download() {
            local MODE=$1; local OUT="$2"; local SURL="$3";
            local SUB_DIR=$(dirname "$OUT")
            sub_flags() {
              case $MODE in
                all)        echo "--write-sub --sub-langs fa,en";;
                auto-both)  echo "--write-auto-sub --sub-langs en,fa";;
              esac
            }
            SFLAGS=$(sub_flags)
            COMMON_SUB="--sub-format vtt/srt/best --convert-subs vtt --skip-download --no-playlist --no-check-certificates --output ${OUT}"
            for METHOD in 1 2 3 4 5 6 7 8; do
              case $METHOD in
                 1) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 2) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 3) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 4) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 5) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android_vr" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 6) yt-dlp --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 7) yt-dlp --extractor-args "youtube:player_client=mweb" $SFLAGS $COMMON_SUB "$SURL" 2>&1 || true;;
                 8) yt-dlp --proxy "socks5://127.0.0.1:1080" --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 
